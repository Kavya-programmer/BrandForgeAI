openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: campaign
    description: AI marketing campaign generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaign/themes:
    get:
      operationId: getThemes
      tags: [campaign]
      summary: Get available campaign themes
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeList"

  /campaign/generate:
    post:
      operationId: generateCampaign
      tags: [campaign]
      summary: Generate a full AI marketing campaign package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignBody"
      responses:
        "200":
          description: Full campaign package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/generate-strategy:
    post:
      operationId: generateStrategy
      tags: [campaign]
      summary: Generate a deep marketing strategy with virality engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignBody"
      responses:
        "200":
          description: Deep strategy result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/generate-video-plan:
    post:
      operationId: generateVideoPlan
      tags: [campaign]
      summary: Generate a 1-Click Ads Factory video production plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignBody"
      responses:
        "200":
          description: Full video production plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoPlanResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/generate-brand:
    post:
      operationId: generateBrand
      tags: [campaign]
      summary: Generate a complete brand identity system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignBody"
      responses:
        "200":
          description: Brand identity package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/generate-influencer:
    post:
      operationId: generateInfluencer
      tags: [campaign]
      summary: Generate an AI influencer persona for the campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignBody"
      responses:
        "200":
          description: Influencer persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfluencerResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/trend-stealer:
    post:
      operationId: trendStealer
      tags: [campaign]
      summary: Trend Stealer Mode - adapts campaign to current viral trends
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignBody"
      responses:
        "200":
          description: Trend-adapted campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendStealerResult"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaign/refine:
    post:
      operationId: refineCampaign
      tags: [campaign]
      summary: Refine previously generated campaign content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefineCampaignBody"
      responses:
        "200":
          description: Refined campaign output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefineCampaignResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    GenerateCampaignBody:
      type: object
      properties:
        brand:
          type: string
        product:
          type: string
        audience:
          type: string
        theme:
          type: string
      required: [brand, product, audience, theme]

    CampaignResult:
      type: object
      properties:
        campaignIdea:
          type: string
        strategy:
          type: string
        adScript:
          type: string
        socialContent:
          type: string
        videoStoryboard:
          type: string
        viralityScore:
          type: number
        viralityExplanation:
          type: string
        estimatedViews:
          type: string
        adsFactory:
          $ref: "#/components/schemas/AdsFactory"
        theme:
          type: string
        brand:
          type: string
      required:
        - campaignIdea
        - strategy
        - adScript
        - socialContent
        - videoStoryboard
        - viralityScore
        - viralityExplanation
        - estimatedViews
        - adsFactory
        - theme
        - brand

    AdsFactory:
      type: object
      properties:
        thumbnailPrompt:
          type: string
        bestPostingTimes:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
        hashtagSets:
          type: object
          properties:
            instagram:
              type: array
              items:
                type: string
            tiktok:
              type: array
              items:
                type: string
      required: [thumbnailPrompt, bestPostingTimes, platforms, hashtagSets]

    StrategyResult:
      type: object
      properties:
        positioning:
          type: string
        audiencePsychology:
          type: string
        viralHooks:
          type: array
          items:
            type: string
        sloganIdeas:
          type: array
          items:
            type: string
        platformStrategy:
          type: string
        competitorAngle:
          type: string
        viralityScore:
          type: number
        viralityExplanation:
          type: string
        estimatedViews:
          type: string
      required:
        - positioning
        - audiencePsychology
        - viralHooks
        - sloganIdeas
        - platformStrategy
        - competitorAngle
        - viralityScore
        - viralityExplanation
        - estimatedViews

    VideoPlanResult:
      type: object
      properties:
        script:
          type: string
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/VideoScene"
        voiceover:
          type: string
        musicStyle:
          type: string
        editingStyle:
          type: string
        captionsText:
          type: string
        thumbnailPrompt:
          type: string
        runwayPrompt:
          type: string
        pikaPrompt:
          type: string
        heygen_prompt:
          type: string
        versions:
          $ref: "#/components/schemas/VideoVersions"
      required:
        - script
        - scenes
        - voiceover
        - musicStyle
        - editingStyle
        - captionsText
        - thumbnailPrompt
        - runwayPrompt
        - pikaPrompt
        - heygen_prompt
        - versions

    VideoScene:
      type: object
      properties:
        sceneNumber:
          type: number
        duration:
          type: string
        visual:
          type: string
        cameraAngle:
          type: string
        audio:
          type: string
        textOverlay:
          type: string
      required: [sceneNumber, duration, visual, cameraAngle, audio, textOverlay]

    VideoVersions:
      type: object
      properties:
        tiktokViral:
          type: string
        luxuryCinematic:
          type: string
        memeVersion:
          type: string
      required: [tiktokViral, luxuryCinematic, memeVersion]

    BrandResult:
      type: object
      properties:
        colorPalette:
          type: array
          items:
            $ref: "#/components/schemas/BrandColor"
        fontPairings:
          type: array
          items:
            type: string
        logoConceptDescription:
          type: string
        aestheticDirection:
          type: string
        moodboardKeywords:
          type: array
          items:
            type: string
        brandVoice:
          type: string
        tagline:
          type: string
        brandArchetype:
          type: string
      required:
        - colorPalette
        - fontPairings
        - logoConceptDescription
        - aestheticDirection
        - moodboardKeywords
        - brandVoice
        - tagline
        - brandArchetype

    BrandColor:
      type: object
      properties:
        name:
          type: string
        hex:
          type: string
        usage:
          type: string
      required: [name, hex, usage]

    InfluencerResult:
      type: object
      properties:
        name:
          type: string
        handle:
          type: string
        age:
          type: number
        location:
          type: string
        bio:
          type: string
        aesthetic:
          type: string
        contentStyle:
          type: string
        audienceSize:
          type: string
        platforms:
          type: array
          items:
            type: string
        contentPillars:
          type: array
          items:
            type: string
        sampleCaptions:
          type: array
          items:
            type: string
        brandCollabAngle:
          type: string
        characterStory:
          type: string
      required:
        - name
        - handle
        - age
        - location
        - bio
        - aesthetic
        - contentStyle
        - audienceSize
        - platforms
        - contentPillars
        - sampleCaptions
        - brandCollabAngle
        - characterStory

    TrendStealerResult:
      type: object
      properties:
        currentTrends:
          type: array
          items:
            $ref: "#/components/schemas/TrendItem"
        adaptedCampaign:
          type: string
        trendHooks:
          type: array
          items:
            type: string
        viralFormula:
          type: string
        soundSuggestions:
          type: array
          items:
            type: string
        timingAdvice:
          type: string
        predictedPlatforms:
          type: array
          items:
            type: string
        hashtagStrategy:
          type: string
        hashtags:
          type: array
          items:
            type: string
        viralFormats:
          type: array
          items:
            type: string
        trendInsights:
          type: array
          items:
            type: string
      required:
        - currentTrends
        - adaptedCampaign
        - trendHooks
        - viralFormula
        - soundSuggestions
        - timingAdvice
        - predictedPlatforms

    RefineCampaignBody:
      type: object
      properties:
        previousResponse:
          type: string
        refinement:
          type: string
        brand:
          type: string
        theme:
          type: string
      required: [previousResponse, refinement]

    RefineCampaignResult:
      type: object
      properties:
        refinedContent:
          type: string
        refinement:
          type: string
      required: [refinedContent, refinement]

    TrendItem:
      type: object
      properties:
        trend:
          type: string
        platform:
          type: string
        virality:
          type: string
        howToUse:
          type: string
      required: [trend, platform, virality, howToUse]

    ThemeList:
      type: object
      properties:
        themes:
          type: array
          items:
            $ref: "#/components/schemas/Theme"
      required: [themes]

    Theme:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
      required: [id, label, description]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
